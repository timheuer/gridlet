name: Build

"on":
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
  workflow_dispatch:
  workflow_call:
    inputs:
      version:
        description: Marketing version for archive builds
        required: false
        type: string
      build_number:
        description: Build number for archive builds
        required: false
        type: string
      export_ipa:
        description: Whether to archive and export an IPA
        required: false
        default: false
        type: boolean
    outputs:
      artifact_name:
        description: Name of the uploaded IPA artifact
        value: ${{ jobs.archive.outputs.artifact_name }}

env:
  DEVELOPER_TEAM: 26G346D9H7
  PROJECT: Gridlet.xcodeproj
  APP_SCHEME: Gridlet
  TEST_SCHEME: GridletTests
  SIMULATOR_DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro Max

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Install XcodeGen
        shell: bash
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Project
        run: xcodegen generate

      - name: Build App
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$APP_SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
            -quiet

      - name: Run Tests
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$TEST_SCHEME" \
            -destination "$SIMULATOR_DESTINATION" \
              -skip-testing:GridletTests/PuzzleGenerationPipelineTests \
            -quiet

  archive:
    if: ${{ inputs.export_ipa == true }}
    needs: build-and-test
    runs-on: macos-15
    timeout-minutes: 30
    outputs:
      artifact_name: ${{ steps.artifact.outputs.name }}

    env:
      ARCHIVE_PATH: build/Gridlet.xcarchive
      EXPORT_PATH: artifacts
      EXPORT_OPTIONS_PLIST: ExportOptions.plist

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.0"

      - name: Install XcodeGen
        shell: bash
        run: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi

      - name: Generate Project
        run: xcodegen generate

      - name: Calculate Version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            MARKETING_VERSION="${{ inputs.version }}"
          else
            MARKETING_VERSION="1.0.0"
          fi

          if [[ -n "${{ inputs.build_number }}" ]]; then
            BUILD_NUMBER="${{ inputs.build_number }}"
          else
            BUILD_NUMBER=$(git rev-list --count HEAD)
          fi

          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Import Distribution Certificate
        uses: apple-actions/import-codesign-certs@v6
        with:
          create-keychain: true
          keychain-password: ${{ secrets.APPSTORE_CERTIFICATE_P12_PASSWORD }}
          p12-file-base64: ${{ secrets.APPSTORE_CERTIFICATE_P12 }}
          p12-password: ${{ secrets.APPSTORE_CERTIFICATE_P12_PASSWORD }}

      - name: Download Provisioning Profile
        id: download_profile
        uses: apple-actions/download-provisioning-profiles@v5
        with:
          bundle-id: com.timheuer.gridlet
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      - name: Resolve Provisioning Profile
        shell: bash
        env:
          PROFILE_JSON: ${{ steps.download_profile.outputs.profiles }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          profiles = json.loads(os.environ["PROFILE_JSON"])
          if not profiles:
              print("No provisioning profiles were downloaded", file=sys.stderr)
              sys.exit(1)

          profile = profiles[0]
          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as env_file:
              env_file.write(f"PROFILE_NAME={profile['name']}\n")
              env_file.write(f"PROFILE_UUID={profile['udid']}\n")
          PY

      - name: Create Export Options
        shell: bash
        run: |
          cat > "$EXPORT_OPTIONS_PLIST" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>method</key>
            <string>app-store-connect</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.timheuer.gridlet</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>$DEVELOPER_TEAM</string>
          </dict>
          </plist>
          EOF

      - name: Archive App
        shell: bash
        run: |
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM="$DEVELOPER_TEAM" \
            PROVISIONING_PROFILE="$PROFILE_UUID" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}"

      - name: Export IPA
        shell: bash
        run: |
          mkdir -p "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Set Artifact Name
        id: artifact
        shell: bash
        run: |
          NAME="Crucigram-v${{ steps.version.outputs.marketing_version }}-${{ steps.version.outputs.build_number }}"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: artifacts/*.ipa
          retention-days: 30
